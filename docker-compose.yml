services:
  crypto-info-mcp:
      build: 
        context: .
        args:
          VERSION: ${VERSION:-local}
        tags:
          - "crypto-info-mcp:${VERSION:-local}"
      image: crypto-info-mcp:${VERSION:-local}
      container_name: crypto-info-mcp
      restart: unless-stopped
      ports:
        - "18123:8123"
      networks:
        - bridge_server
      env_file:
        - .env

networks:
  bridge_server:
    external: true
