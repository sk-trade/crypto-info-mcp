name: Docker Image CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q

      - name: Compile sources
        run: uv run python -m compileall src example scripts tests

  build:
    needs: test
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: get_version
        run: echo "version=$(grep '^version =' pyproject.toml | sed -E 's/version = \"(.*)\"/\1/')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t myapp:${{ steps.get_version.outputs.version }} -f Dockerfile .

      - name: Run Docker container
        run: docker run -d -p 8123:8123 --name myapp-container myapp:${{ steps.get_version.outputs.version }}

      - name: Verify Docker container startup
        run: |
          for _ in $(seq 1 30); do
            if docker logs myapp-container 2>&1 | grep -q "Application startup complete"; then
              docker logs myapp-container
              exit 0
            fi

            if [ "$(docker inspect -f '{{.State.Running}}' myapp-container)" != "true" ]; then
              docker logs myapp-container
              exit 1
            fi

            sleep 1
          done

          docker logs myapp-container
          exit 1

      - name: Cleanup container
        if: always()
        run: |
          docker stop myapp-container || true
          docker rm myapp-container || true

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'workflow_dispatch' || github.event_name == 'push')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Copy files to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "~/docker/${{ github.event.repository.name }}"
          rm: true

      - name: Deploy to Ubuntu server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          DEPLOY_VERSION: ${{ needs.build.outputs.version }}
          DEPLOY_COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          DEPLOY_TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          DEPLOY_TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          DEPLOY_TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DEPLOY_VERSION,DEPLOY_COINGECKO_API_KEY,DEPLOY_TELEGRAM_API_ID,DEPLOY_TELEGRAM_API_HASH,DEPLOY_TELEGRAM_SESSION_STRING
          script: |
            set -e

            REPO_FULL_NAME="${{ github.repository }}"
            REPO_NAME=$(echo "$REPO_FULL_NAME" | cut -d'/' -f2)

            cd ~/docker/
            mkdir -p "$REPO_NAME"
            cd "$REPO_NAME"

            install -m 600 /dev/null .env
            {
              printf 'VERSION=%s\n' "$DEPLOY_VERSION"
              printf 'COINGECKO_API_KEY=%s\n' "$DEPLOY_COINGECKO_API_KEY"
              printf 'TELEGRAM_API_ID=%s\n' "$DEPLOY_TELEGRAM_API_ID"
              printf 'TELEGRAM_API_HASH=%s\n' "$DEPLOY_TELEGRAM_API_HASH"
              printf 'TELEGRAM_SESSION_STRING=%s\n' "$DEPLOY_TELEGRAM_SESSION_STRING"
            } >> .env

            docker compose build --no-cache
            docker compose up -d --no-build --remove-orphans
